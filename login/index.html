<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Sign in and Sign up  - Single Form</title>
    <link rel='stylesheet' href='https://fonts.googleapis.com/css?family=Open+Sans:400,700,300,600'><link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <div class="cont_principal">

  <div class="cont_centrar">
  <div class="cont_login">
    <form action="">
    <div class="cont_tabs_login">
      <ul class='ul_tabs'>
        <li class="active"><a href="#" onclick="sign_in()">SIGN IN</a>
        <span class="linea_bajo_nom"></span>
        </li>
        <li><a href="#up" onclick="sign_up()">SIGN UP</a><span class="linea_bajo_nom"></span>
        </li>
      </ul>
      </div>
<form id="loginForm">
    <h3>Silahkan Login</h3>
    label for="username">Nama Pengguna </label>
    <input type="text" id="username" placeholder="Nama Pengguna.." required="required"> 

   <label for password">Password</label>
  <input type="password" id="password" placeholder="Password.." required="required">

    <a href="#" class="link_forgot_pass d_block" >Forgot Password ?</a>    
<div class="terms_and_cons d_none">
    <p><input type="checkbox" name="terms_and_cons" /> <label for="terms_and_cons">Accept  Terms and Conditions.</label></p>
  
    </div>
      </div>
<div class="cont_btn">
     <button class="btn_sign">SIGN IN</button>
      
      </div>
      
    </form>
    <div id="alertBox" class="alert" style="display:none;"></div>
    </div>
    
  </div>
  

</div>
    <script  src="./script.js"></script>
    <script src="js/login.js"></script>

  </body>
  </html>
