<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign in and Sign up - Single Form</title>
  <link rel='stylesheet' href='https://fonts.googleapis.com/css?family=Open+Sans:400,700,300,600'>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
<div class="cont_principal">
  <div class="cont_centrar">

    <!-- FORM LOGIN -->
    <div id="cont_login">
      <form id="loginForm">
        <div class="cont_tabs_login">
          <ul class='ul_tabs'>
            <li class="active"><a href="#" onclick="showLogin(); return false;">SIGN IN</a><span class="linea_bajo_nom"></span></li>
            <li><a href="#" onclick="showRegister(); return false;">SIGN UP</a><span class="linea_bajo_nom"></span></li>
          </ul>
        </div>
        <div class="cont_text_inputs">
          <input type="text" id="username" class="input_form_sign d_block active_inp" placeholder="USERNAME" name="username_us" />
          <input type="password" id="password" class="input_form_sign d_block active_inp" placeholder="PASSWORD" name="pass_us" />
          <a href="#" class="link_forgot_pass d_block">Forgot Password?</a>
        </div>
        <div class="cont_btn">
          <button type="submit" class="btn_sign">SIGN IN</button>
        </div>
      </form>
      <div id="alertBox" class="alert" style="display:none;"></div>
    </div>

    <!-- FORM REGISTER -->
    <div id="cont_register" style="display:none;">
      <form id="registerForm">
        <div class="cont_tabs_login">
          <ul class='ul_tabs'>
            <li><a href="#" onclick="showLogin(); return false;">SIGN IN</a><span class="linea_bajo_nom"></span></li>
            <li class="active"><a href="#" onclick="showRegister(); return false;">SIGN UP</a><span class="linea_bajo_nom"></span></li>
          </ul>
        </div>
        <div class="cont_text_inputs">
          <input type="text" id="username" class="input_form_sign d_block active_inp" placeholder="USERNAME" name="name_us" />
          <input type="text" id="email" class="input_form_sign d_block active_inp" placeholder="EMAIL" name="email_us" />
          <input type="password" id="password" class="input_form_sign d_block active_inp" placeholder="PASSWORD" name="pass_us" />
          <input type="password" id="confirmPassword" class="input_form_sign d_block active_inp" placeholder="CONFIRM PASSWORD" name="conf_pass_us" />
          <div class="terms_and_cons d_block">
            <p><input type="checkbox" name="terms_and_cons" /> <label>Accept Terms and Conditions.</label></p>
          </div>
        </div>
        <div class="cont_btn">
          <button type="submit" class="btn_sign">SIGN UP</button>
        </div>
      </form>
      <p id="message"></p>
    </div>

  </div>
</div>

<script>
  function showLogin() {
    document.getElementById('cont_login').style.display = 'block';
    document.getElementById('cont_register').style.display = 'none';
  }
  function showRegister() {
    document.getElementById('cont_login').style.display = 'none';
    document.getElementById('cont_register').style.display = 'block';
  }
  window.onload = function() {
    document.querySelector('.cont_centrar').className = "cont_centrar cent_active";
  }
</script>
<script src="js/login.js"></script>
<script src="js/register.js"></script>
<script src="./script.js"></script>
</body>
</html>
