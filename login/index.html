<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Responsive Login + Signup form </title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Responsive Signup with login form</title>
    <link rel="stylesheet" href="index.css" type="text/css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" type="text/css"><link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <div class="form-modal">
  <form id="loginForm">
    
    <div class="form-toggle">
        <button id="login-toggle" onclick="toggleLogin()">log in</button>
        <button id="signup-toggle" onclick="toggleSignup()">sign up</button>
    </div>

    <div id="login-form">
        <form>
            <input type="text" id="username" placeholder="Enter username"/>
            <input type="password" id="password" placeholder="Enter password"/>
            <button type="button" class="btn login">login</button>
            <p><a href="javascript:void(0)">Forgotten account</a></p>
            <hr/>

        </form>
    </div>

    <div id="signup-form">
    <form id="signupFor">
        <form>
            <input type="email" id="email" placeholder="Enter your email"/>
            <input type="text" id="username" placeholder="Choose username"/>
            <input type="password" id="password "placeholder="Create password"/>
            <button type="button" cla ss="btn signup">create account</button>
            <p>Clicking <strong>create account</strong> means that you are agree to our <a href="javascript:void(0)">terms of services</a>.</p>
            <hr/>
           
        </form>
       <div id="alertBox" class="alert" style="display:none;"></div>

    </div>

</div>
    <script  src="./script.js"></script>
    <script src="js/login.js"></script>
  </body>
  
</html>
